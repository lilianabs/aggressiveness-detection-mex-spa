data:
  drive_raw_data_path: "/content/drive/MyDrive/data_colab/MEX-A3T/train_aggressiveness.csv"
  local_raw_data_path: "data/train_aggressiveness.csv"
  local_preprocessed_data_path: "data/train_aggressiveness_cleaned.csv"
  local_predictions_path: "data/test_predictions.csv"

reproducibility:
  train_test_split:
    test_size: 0.2
    random_state: 42
    stratify: true  # Preserve class distribution

task:
  text_column: "Text"
  label_column: "Category"
  preprocessing_steps:
    - remove_emojis
    - remove_special_tokens
    - lowercase
    - remove_punctuation
    - remove_stopwords
    - remove_extra_whitespace